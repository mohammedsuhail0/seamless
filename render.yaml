# BrowSync Render Blueprint Specification
# Use this Blueprint to deploy the co-browsing server instantly with one click.

services:
  - type: web
    name: browsync-api
    env: node
    plan: free
    buildCommand: npm ci --include=dev --workspaces --include-workspace-root && npm run build -w packages/shared && npm run build -w packages/server
    startCommand: npx prisma db push --schema packages/server/prisma/schema.prisma && npm run db:seed -w packages/server && npm run start -w packages/server
    envVars:
      - key: NODE_VERSION
        value: 20.15.1
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/opt/render/project/src/packages/server/prisma/dev.db
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_SECRET
        generateValue: true
      - key: REFRESH_TOKEN_SECRET
        generateValue: true
