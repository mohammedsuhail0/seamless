<!-- Agent: 💻 Agent D (Desktop Host UI) -->
<!-- File: packages/desktop/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowSync Host Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #111638;
      --bg-tertiary: #1a1f4a;
      --bg-surface: rgba(255, 255, 255, 0.04);
      --color-primary: #4f46e5;
      --color-primary-hover: #4338ca;
      --color-success: #10b981;
      --color-error: #ef4444;
      --color-warning: #f59e0b;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-default: rgba(255, 255, 255, 0.08);
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --glass-blur: blur(16px);
      --font-sans: 'Inter', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-sans);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      padding: 2rem;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .radial-glow {
      position: absolute;
      width: 400px;
      height: 400px;
      top: -100px;
      right: -100px;
      background: radial-gradient(circle, rgba(79, 70, 229, 0.1) 0%, rgba(0,0,0,0) 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .logo span { font-size: 2rem; }
    .logo h1 { font-weight: 800; font-size: 1.5rem; letter-spacing: 0.5px; }

    .status-badge {
      background: rgba(16, 185, 129, 0.1);
      color: var(--color-success);
      border: 1px solid rgba(16, 185, 129, 0.2);
      padding: 0.35rem 0.75rem;
      border-radius: 9999px;
      font-size: 0.75rem;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
    }
    .status-badge::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--color-success);
      border-radius: 50%;
      display: inline-block;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      padding: 2rem;
      transition: all 0.3s ease;
    }
    .card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.04);
    }

    .card-title {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      color: #a5b4fc;
    }

    /* Screen Capture Source grid */
    .source-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1rem;
      max-height: 200px;
      overflow-y: auto;
      padding: 0.5rem;
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-md);
      background: rgba(0,0,0,0.2);
    }

    .source-item {
      background: rgba(255, 255, 255, 0.04);
      border: 1.5px solid var(--border-default);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s ease;
    }
    .source-item:hover {
      border-color: var(--color-primary);
      background: rgba(79, 70, 229, 0.08);
      transform: translateY(-1px);
    }
    .source-item.selected {
      border-color: var(--color-primary);
      background: rgba(79, 70, 229, 0.15);
      box-shadow: 0 0 10px rgba(79, 70, 229, 0.3);
    }

    .source-thumbnail {
      width: 100%;
      height: 70px;
      object-fit: cover;
      border-radius: 4px;
      margin-bottom: 0.5rem;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .source-name {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius-md);
      font-weight: 600;
      font-size: 0.875rem;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      width: 100%;
      margin-top: 1rem;
    }
    .btn-primary {
      background: var(--color-primary);
      color: white;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.3);
    }
    .btn-primary:hover {
      background: var(--color-primary-hover);
      box-shadow: 0 4px 20px rgba(79, 70, 229, 0.5);
    }

    /* Access Toast notifications */
    .toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      z-index: 100;
    }

    .toast {
      background: rgba(17, 22, 56, 0.95);
      backdrop-filter: var(--glass-blur);
      border: 1.5px solid var(--color-primary);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      min-width: 320px;
      box-shadow: var(--shadow-lg);
      animation: slideInRight 250ms cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    @keyframes slideInRight {
      0% { transform: translateX(100%); opacity: 0; }
      100% { transform: translateX(0); opacity: 1; }
    }

    .toast-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .toast-title { font-weight: 700; font-size: 0.9rem; color: #a5b4fc; }
    .toast-body { font-size: 0.85rem; color: var(--text-secondary); }
    .toast-actions { display: flex; gap: 0.5rem; }

    .btn-toast {
      flex: 1;
      padding: 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
    }
    .btn-allow { background: var(--color-success); color: white; }
    .btn-deny { background: rgba(255,255,255,0.06); color: var(--text-secondary); }
    .btn-deny:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

    .controller-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(245, 158, 11, 0.1);
      border: 1.5px solid rgba(245, 158, 11, 0.2);
      color: var(--color-warning);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: bold;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="radial-glow"></div>

  <!-- Sliding alerts container -->
  <div class="toast-container" id="toastContainer"></div>

  <div class="container">
    <header>
      <div class="logo">
        <span>📡</span>
        <h1>BrowSync Host Panel</h1>
      </div>
      <span class="status-badge">Signaling Online</span>
    </header>

    <!-- Display capture source selection cards -->
    <section class="card">
      <h3 class="card-title">🔗 Room Session</h3>
      <div style="display:grid; gap:0.75rem; grid-template-columns: repeat(3, minmax(0, 1fr));">
        <input id="roomCodeInput" placeholder="Room Code (e.g. C8VM6Y)" style="padding:0.65rem;border-radius:8px;border:1px solid var(--border-default);background:rgba(255,255,255,0.03);color:var(--text-primary);" />
        <input id="displayNameInput" placeholder="Display Name" style="padding:0.65rem;border-radius:8px;border:1px solid var(--border-default);background:rgba(255,255,255,0.03);color:var(--text-primary);" />
        <input id="tokenInput" placeholder="Access Token (optional)" style="padding:0.65rem;border-radius:8px;border:1px solid var(--border-default);background:rgba(255,255,255,0.03);color:var(--text-primary);" />
      </div>
      <button class="btn btn-primary" id="joinRoomBtn">Join Room As Host Streamer</button>
      <p id="joinStatus" style="margin-top:0.5rem;color:var(--text-muted);font-size:0.8rem;">Not joined</p>
    </section>

    <section class="card">
      <h3 class="card-title">🖥️ Select Stream Source</h3>
      <div class="source-grid" id="sourcesGrid">
        <div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem; font-size: 0.85rem;">
          Querying local window frame captures...
        </div>
      </div>
      <button class="btn btn-primary" id="startBtn">Start Streaming Session</button>
    </section>

    <!-- Active controller segment log -->
    <section class="card">
      <h3 class="card-title">🎮 Remote Access & Controller Status</h3>
      <div id="controllerStatus">
        <p style="color: var(--text-secondary); font-size: 0.875rem;">Currently sharing view-only stream. No active remote controls.</p>
      </div>
    </section>
  </div>

  <script>
    // Interface logic hooking contextBridge APIs
    const browsync = window.browsync;
    const sourcesGrid = document.getElementById('sourcesGrid');
    const startBtn = document.getElementById('startBtn');
    const joinRoomBtn = document.getElementById('joinRoomBtn');
    const roomCodeInput = document.getElementById('roomCodeInput');
    const displayNameInput = document.getElementById('displayNameInput');
    const tokenInput = document.getElementById('tokenInput');
    const joinStatus = document.getElementById('joinStatus');
    const toastContainer = document.getElementById('toastContainer');
    const controllerStatus = document.getElementById('controllerStatus');

    let selectedSourceId = null;
    let currentRoomId = null;
    let currentUserId = null;
    let joinedMembers = [];
    let localStream = null;
    const peerConnections = new Map();

    const SOCKET_EVENTS = {
      RTC_OFFER: 'rtc:offer',
      RTC_ANSWER: 'rtc:answer',
      RTC_ICE_CANDIDATE: 'rtc:ice-candidate'
    };

    async function loadSources() {
      if (!browsync) return;
      
      const sources = await browsync.getSources();
      if (sources.length === 0) {
        sourcesGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: var(--text-muted); padding: 2rem;">No windows/displays detected</div>`;
        return;
      }

      sourcesGrid.innerHTML = '';
      sources.forEach((source) => {
        const item = document.createElement('div');
        item.className = 'source-item';
        if (selectedSourceId === source.id) item.classList.add('selected');
        
        item.innerHTML = `
          <img src="${source.thumbnailUrl}" class="source-thumbnail" alt="${source.name}" />
          <div class="source-name">${source.name}</div>
        `;

        item.onclick = () => {
          document.querySelectorAll('.source-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          selectedSourceId = source.id;
          browsync.selectSource(source.id);
        };

        sourcesGrid.appendChild(item);
      });
    }

    startBtn.onclick = () => {
      startStreaming().catch((err) => {
        console.error(err);
        alert(`Failed to start streaming: ${err.message || err}`);
      });
    };

    async function startStreaming() {
      if (!currentRoomId || !currentUserId) {
        alert('Join room first.');
        return;
      }
      if (!selectedSourceId) {
        alert('Please select a screen/window source to stream first!');
        return;
      }

      if (!localStream) {
        const stream = await navigator.mediaDevices.getUserMedia({
          audio: false,
          video: {
            mandatory: {
              chromeMediaSource: 'desktop',
              chromeMediaSourceId: selectedSourceId,
              maxWidth: 1920,
              maxHeight: 1080,
              maxFrameRate: 30
            }
          }
        });
        localStream = stream;
      }

      const targets = joinedMembers.filter((m) => m.userId !== currentUserId && m.role !== 'HOST');
      if (targets.length === 0) {
        alert('Streaming source ready. Waiting for viewers to join room...');
        return;
      }

      for (const member of targets) {
        await ensurePeerForViewer(member.userId);
      }

      alert(`Streaming started for ${targets.length} viewer(s).`);
    }

    async function ensurePeerForViewer(targetUserId) {
      if (!localStream) return;
      if (peerConnections.has(targetUserId)) return;

      const pc = new RTCPeerConnection({
        iceServers: [
          { urls: 'stun:stun.l.google.com:19302' },
          { urls: 'stun:stun1.l.google.com:19302' }
        ]
      });

      peerConnections.set(targetUserId, pc);

      localStream.getTracks().forEach((track) => pc.addTrack(track, localStream));

      pc.onicecandidate = (event) => {
        if (event.candidate) {
          browsync.sendIceCandidate(targetUserId, event.candidate);
        }
      };

      const inputChannel = pc.createDataChannel('input');
      inputChannel.onmessage = (evt) => {
        try {
          const parsed = JSON.parse(evt.data);
          // Relay incoming input events to existing main process path.
          console.log('Input event over data channel', parsed?.type);
          if (browsync && typeof browsync.injectInput === 'function') {
            browsync.injectInput(parsed);
          }
        } catch (_e) {}
      };

      pc.createDataChannel('control');

      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      browsync.sendRtcOffer(targetUserId, offer);
    }

    async function handleRtcAnswer(payload) {
      const pc = peerConnections.get(payload.senderUserId);
      if (!pc || !payload.sdp) return;
      await pc.setRemoteDescription(new RTCSessionDescription(payload.sdp));
    }

    async function handleRtcIceCandidate(payload) {
      const pc = peerConnections.get(payload.senderUserId);
      if (!pc || !payload.candidate) return;
      await pc.addIceCandidate(new RTCIceCandidate(payload.candidate));
    }

    function setMembers(members) {
      joinedMembers = members || [];
      const targets = joinedMembers.filter((m) => m.userId !== currentUserId && m.role !== 'HOST');
      const targetUserIds = new Set(targets.map((m) => m.userId));

      // Close and remove stale peer connections
      for (const [viewerId, pc] of peerConnections.entries()) {
        if (!targetUserIds.has(viewerId)) {
          console.log(`Pruning stale peer connection for viewer: ${viewerId}`);
          try {
            pc.close();
          } catch (e) {
            console.error(`Error closing stale peer connection for ${viewerId}:`, e);
          }
          peerConnections.delete(viewerId);
        }
      }

      if (localStream) {
        targets.forEach((m) => ensurePeerForViewer(m.userId).catch(console.error));
      }
    }

    joinRoomBtn.onclick = () => {
      const roomCode = roomCodeInput.value.trim().toUpperCase();
      const displayName = displayNameInput.value.trim() || 'Desktop Host';
      const token = tokenInput.value.trim();
      if (!roomCode || roomCode.length !== 6) {
        alert('Enter a valid 6-character room code.');
        return;
      }
      browsync.joinRoom({ roomCode, displayName, token: token || undefined });
      joinStatus.textContent = `Joining room ${roomCode}...`;
    };

    // Load available windows on load
    loadSources();

    // Attach IPC Preload alert listeners
    if (browsync) {
      browsync.getServerUrl().then((url) => {
        joinStatus.textContent = `Connected target: ${url}. Not joined yet.`;
      }).catch(() => {});

      browsync.onSocketConnected((_event, payload) => {
        if (payload?.socketId) {
          joinStatus.textContent = `Socket connected (${payload.socketId}). Join a room to stream.`;
        }
      });

      browsync.onRoomJoined((_event, payload) => {
        if (!payload?.roomId) return;
        currentRoomId = payload.roomId;
        currentUserId = payload.userId || null;
        joinStatus.textContent = `Joined room ${payload.roomCode} as ${payload.displayName} (${payload.role}).`;
      });

      browsync.onPresenceSync((_event, payload) => {
        setMembers(payload?.members || []);
      });

      browsync.onRoomError((_event, payload) => {
        joinStatus.textContent = `Join failed: ${payload?.message || 'Unknown error'}`;
      });

      browsync.onRtcAnswer((_event, payload) => {
        handleRtcAnswer(payload).catch(console.error);
      });

      browsync.onRtcIceCandidate((_event, payload) => {
        handleRtcIceCandidate(payload).catch(console.error);
      });

      browsync.onControlRequest((event, payload) => {
        const { viewerId, viewerName, queuePosition } = payload;
        
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.id = `toast_${viewerId}`;
        toast.innerHTML = `
          <div class="toast-header">
            <span class="toast-title">🎮 Remote Control Request</span>
            <span style="font-size: 0.75rem; color: var(--text-muted);">Queue: ${queuePosition}</span>
          </div>
          <div class="toast-body">
            <strong>${viewerName}</strong> wishes to take control of your browser.
          </div>
          <div class="toast-actions">
            <button class="btn-toast btn-allow" id="allow_${viewerId}">Allow Control</button>
            <button class="btn-toast btn-deny" id="deny_${viewerId}">Deny</button>
          </div>
        `;

        toastContainer.appendChild(toast);

        // Grant access click
        document.getElementById(`allow_${viewerId}`).onclick = () => {
          if (!currentRoomId) return;
          browsync.grantControl(currentRoomId, viewerId);
          toast.remove();
          
          controllerStatus.innerHTML = `
            <div class="controller-badge">Currently Controlled by: ${viewerName}</div>
            <button class="btn btn-danger" id="revokeBtn" style="max-width: 180px; margin-top: 1rem; padding: 0.5rem 1rem; font-size: 0.8rem;">Revoke Control</button>
          `;

          document.getElementById('revokeBtn').onclick = () => {
            if (!currentRoomId) return;
            browsync.revokeControl(currentRoomId);
            controllerStatus.innerHTML = `<p style="color: var(--text-secondary); font-size: 0.875rem;">Currently sharing view-only stream. No active remote controls.</p>`;
          };
        };

        // Deny access click
        document.getElementById(`deny_${viewerId}`).onclick = () => {
          if (!currentRoomId) return;
          browsync.denyControl(currentRoomId, viewerId);
          toast.remove();
        };

        // Auto-remove toast notification after 15 seconds (Matches TRD timeout auto-deny)
        setTimeout(() => {
          toast.remove();
        }, 15000);
      });

      browsync.onControlReleased((event, payload) => {
        controllerStatus.innerHTML = `<p style="color: var(--text-secondary); font-size: 0.875rem;">Currently sharing view-only stream. No active remote controls.</p>`;
      });
    }
  </script>
</body>
</html>
