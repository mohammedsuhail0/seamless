# Agent: 🧠 Orchestrator Agent (Infrastructure)
version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: browsync-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: browsync
      POSTGRES_PASSWORD: browsync_dev
      POSTGRES_DB: browsync
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: browsync-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  # Coturn TURN Server (Staging/Production NAT-bypass relay)
  # Uncomment and configure parameters when deploying on your cloud VPS
  # turnserver:
  #   image: coturn/coturn:4.6.2-alpine
  #   container_name: browsync-turn
  #   network_mode: host
  #   volumes:
  #     - ./turnserver.conf:/etc/coturn/turnserver.conf
  #   restart: unless-stopped

volumes:
  pgdata:

